name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Run the suite on Linux (fast, primary) and Windows (where the
        # actual reported failures happen — ERR_FS_FILE_TOO_LARGE,
        # EBUSY on the state DB, etc.).
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run test
